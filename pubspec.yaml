publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=2.17.5 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.0.15
  auto_route: ^4.0.1
  provider: ^6.0.3
  http: ^0.13.4
  flutter_native_splash: ^2.2.3+1
